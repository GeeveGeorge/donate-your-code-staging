# Compaction: hourly drain of merged staging records into the canonical
# Hugging Face Parquet dataset. Runs in the TRUSTED context (it holds HF_TOKEN).
# A single bot writer => ~24 HF commits/day, never the per-user commit-degradation
# problem. The manifest is the idempotency key, so re-runs are safe.
name: compact

on:
  schedule:
    - cron: '17 * * * *'   # hourly, offset to avoid the top-of-hour rush
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: compaction
  cancel-in-progress: false

jobs:
  compact:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    # HF_TOKEN is a repo secret. It is safe at repo level here: fork PRs (the only
    # untrusted input) never receive secrets, and only maintainers can change
    # workflows (CODEOWNERS), so no untrusted workflow can read it. For an extra
    # gate you may move it into a protected `environment:` with no reviewers.
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: true

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.12'

      - name: Install deps
        run: python -m pip install -r scripts/requirements.txt

      - name: Compact → Parquet → Hugging Face
        env:
          HF_DATASET: ${{ vars.HF_DATASET }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python scripts/compact.py

      - name: Commit drained staging + manifest
        run: |
          git config user.name "dyc-bot"
          git config user.email "dyc-bot@users.noreply.github.com"
          git add -A
          if ! git diff --cached --quiet; then
            git commit -m "compaction: drain staging, update manifest"
            git push
          else
            echo "nothing to commit"
          fi
