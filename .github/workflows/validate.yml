# Stage 1: untrusted validation of contribution PRs.
# Runs on fork PRs with a READ-ONLY token and NO repository secrets, so even a
# malicious PR can neither write anything nor steal credentials. It only gives
# fast feedback; the trusted gatekeeper re-validates before any merge.
name: validate

on:
  pull_request:
    paths:
      - 'staging/**'

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout PR head (untrusted content, no creds)
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false

      - name: List changed files
        run: |
          git fetch --no-tags --depth=1 origin ${{ github.event.pull_request.base.sha }}
          git diff --name-only ${{ github.event.pull_request.base.sha }} ${{ github.event.pull_request.head.sha }} > changed.txt
          echo "Changed files:"; cat changed.txt

      - name: Path scope — reject anything outside staging/**
        run: |
          if grep -vE '^staging/[0-9a-f]{2}/[0-9a-f]{2}/[0-9a-f]{64}\.json$' changed.txt | grep -q .; then
            echo "::error::PR modifies paths outside staging/**. Contribution PRs may only add data records."
            grep -vE '^staging/[0-9a-f]{2}/[0-9a-f]{2}/[0-9a-f]{64}\.json$' changed.txt
            exit 1
          fi

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.12'

      # validate.py is standard-library only — the untrusted job installs nothing.
      - name: Validate records (schema / structure / model / content-address / backstop)
        run: python scripts/validate.py --changed changed.txt

      - name: Secret scan (gitleaks)
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2
        env:
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: 'false'
